name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Verify third-party licenses
        run: |
          pnpm generate-licenses
          git diff --exit-code THIRD_PARTY_LICENSES.txt || {
            echo "::error::THIRD_PARTY_LICENSES.txt is out of date. Run 'pnpm generate-licenses' and commit the result."
            exit 1
          }

      - name: Build
        run: pnpm build

  test:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

  e2e-linux:
    if: github.event_name == 'pull_request'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm build

      - name: Install Electron system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libasound2t64 libnss3 libxss1

      - name: Cache E2E artifacts
        uses: actions/cache@v5
        with:
          path: e2e-tests/cache
          key: e2e-cache-${{ runner.os }}-${{ hashFiles('e2e-tests/global-setup.ts', 'e2e-tests/setup/**', 'e2e-tests/versions.ts') }}

      - name: Run E2E tests
        run: xvfb-run --auto-servernum pnpm test:e2e

  e2e-linux-all:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm build

      - name: Install Electron system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libasound2t64 libnss3 libxss1

      - name: Cache E2E artifacts
        uses: actions/cache@v5
        with:
          path: e2e-tests/cache
          key: e2e-cache-${{ runner.os }}-all-${{ hashFiles('e2e-tests/global-setup.ts', 'e2e-tests/setup/**', 'e2e-tests/versions.ts') }}

      - name: Run E2E tests (all versions)
        run: xvfb-run --auto-servernum pnpm test:e2e:all

  e2e-macos:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm build

      - name: Cache E2E artifacts
        uses: actions/cache@v5
        with:
          path: e2e-tests/cache
          key: e2e-cache-${{ runner.os }}-${{ hashFiles('e2e-tests/global-setup.ts', 'e2e-tests/setup/**', 'e2e-tests/versions.ts') }}

      - name: Run E2E tests
        run: pnpm test:e2e

  e2e-windows:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm build

      - name: Cache E2E artifacts
        uses: actions/cache@v5
        with:
          path: e2e-tests/cache
          key: e2e-cache-${{ runner.os }}-${{ hashFiles('e2e-tests/global-setup.ts', 'e2e-tests/setup/**', 'e2e-tests/versions.ts') }}

      - name: Run E2E tests
        run: pnpm test:e2e
